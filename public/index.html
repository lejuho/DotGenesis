<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DotGenesis POC</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <h1>DotGenesis</h1>
      <p class="sub">Web2 Fake-Multiplayer POC</p>

      <!-- Main play field (egg/canvas) -->
      <div id="eggWrap" class="egg-wrap">
        <canvas id="field" width="400" height="400"></canvas>
        <div id="crackOverlay" class="crack-overlay hidden">
          <svg viewBox="0 0 400 400" aria-hidden="true">
            <path d="M200 28 L188 90 L214 132 L196 172 L218 214 L180 246 L206 286 L182 334" />
            <path d="M196 172 L140 164 L110 136 L78 142" />
            <path d="M196 172 L256 170 L292 138 L326 146" />
            <path d="M180 246 L126 254 L92 286 L58 286" />
            <path d="M206 286 L256 294 L292 330 L338 336" />
            <path d="M214 132 L248 98 L276 66 L304 58" />
            <path d="M188 90 L160 70 L132 48 L100 38" />
          </svg>
        </div>
      </div>
      <p id="fieldHint" class="field-hint">Seed the map to push ecosystem pressure.</p>

      <!-- Primary player action -->
      <div class="controls">
        <button id="seedBtn" type="button">Daily Seed</button>
      </div>

      <!-- Color faction selection (strategy input) -->
      <section class="panel">
        <div class="row">
          <span>Faction</span>
          <span id="selectedFactionLabel">#ff4d4d</span>
        </div>
        <div id="factionButtons" class="factions"></div>
      </section>

      <!-- Instability feedback -->
      <section class="panel">
        <div class="row">
          <span>Instability</span>
          <span id="instabilityValue">0</span>
        </div>
        <div class="bar">
          <div id="instabilityFill" class="bar-fill"></div>
        </div>
      </section>

      <!-- User-facing: recent color flow -->
      <section class="panel">
        <div class="row">
          <span>Recent 5 Colors</span>
        </div>
        <div id="recentColors" class="recent-colors"></div>
      </section>

      <!-- Dev-only: remove later (visible only with ?dev=1) -->
      <section id="devPanel" class="panel">
        <div class="row">
          <span>Dev Point Stats</span>
          <span id="totalPointsStat">Total: 0</span>
        </div>
        <div id="factionStats" class="dev-stats"></div>
      </section>

      <!-- Global round timer (prep/active/rest) -->
      <section class="panel">
        <div class="row">
          <span>Ascension (Prep 10s + Global 10m + Rest 1m)</span>
          <span id="countdownValue">PREP 00:10 (R1)</span>
        </div>
      </section>

      <!-- Round outcome summary -->
      <p id="resultMessage" class="result"></p>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/main.js"></script>
  </body>
</html>
